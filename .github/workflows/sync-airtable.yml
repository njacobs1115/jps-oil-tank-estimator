name: Sync Airtable City Pricing

on:
  schedule:
    # 1st of every month at 8am ET (12:00 UTC)
    - cron: '0 12 1 * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync city data from Airtable
        env:
          AIRTABLE_API_TOKEN: ${{ secrets.AIRTABLE_API_TOKEN }}
        run: node sync-airtable.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet booking-funnel.html && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add booking-funnel.html
          git commit -m "Auto-sync city pricing from Airtable [$(date +%Y-%m-%d)]"
          git push
